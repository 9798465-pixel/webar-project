<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r126/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden; background-color: #000;">

    <div id="access" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid red;">
        <div style="text-align: center; font-family: sans-serif;">
            <h1 style="font-size: 30px;">CLICK HERE TO START</h1>
            <p>Нажми на экран, чтобы включить камеру</p>
        </div>
    </div>

    <script>
        document.getElementById('access').addEventListener('click', function() {
            this.style.display = 'none';
            initApp();
        });

        function initApp() {
            const scene = new THREE.Scene();
            const camera = new THREE.Camera();
            scene.add(camera);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            document.body.appendChild(renderer.domElement);

            const listener = new THREE.AudioListener();
            camera.add(listener);

            const arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
            arSource.init(() => {
                setTimeout(() => {
                    arSource.onResizeElement();
                    arSource.copyElementSizeTo(renderer.domElement);
                }, 2000);
            });

            const arContext = new THREEx.ArToolkitContext({
                cameraParametersUrl: 'data/camera_para.dat',
                detectionMode: 'mono_and_matrix',
                matrixCodeType: '3x3',
            });
            arContext.init(() => {
                camera.projectionMatrix.copy(arContext.getProjectionMatrix());
            });

            // Настройка контента
            const markers = [
                { id: 1, img: "author.jpg", audio: "author.mp3" },
                { id: 2, img: "bissaker.jpg", audio: "bissaker.mp3" },
                { id: 3, img: "device.jpg", audio: "principle.mp3" }
            ];

            const texLoader = new THREE.TextureLoader();
            const audioLoader = new THREE.AudioLoader();
            const sounds = new Map();

            markers.forEach(m => {
                const markerRoot = new THREE.Group();
                scene.add(markerRoot);
                new THREEx.ArMarkerControls(arContext, markerRoot, { type: 'barcode', barcodeValue: m.id });

                texLoader.load(m.img, (tex) => {
                    const plane = new THREE.Mesh(
                        new THREE.PlaneBufferGeometry(1.5, 1.5),
                        new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
                    );
                    plane.rotation.x = -Math.PI / 2;
                    markerRoot.add(plane);
                });

                audioLoader.load(m.audio, (buffer) => {
                    const s = new THREE.Audio(listener);
                    s.setBuffer(buffer);
                    sounds.set(m.id, s);
                });
            });

            function animate() {
                requestAnimationFrame(animate);
                if (arSource.ready) {
                    arContext.update(arSource.domElement);
                    markers.forEach(m => {
                        const s = sounds.get(m.id);
                        if (arContext.arController && arContext.arController.barcodeMarkers[m.id].inCurrent) {
                            if (s && !s.isPlaying) s.play();
                        } else {
                            if (s && s.isPlaying) s.stop();
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
