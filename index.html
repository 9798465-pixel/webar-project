<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r126/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">

    <div id="access" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <div style="text-align: center;">
            <p style="font-size: 20px;">PRESS HERE</p>
            <p>TO ENTER THE EXPERIENCE</p>
        </div>
    </div>

    <script>
        const access = document.getElementById('access');

        access.addEventListener('click', () => {
            access.style.display = 'none';
            initAR();
        });

        function initAR() {
            // Базовые настройки сцены
            const scene = new THREE.Scene();
            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);

            const camera = new THREE.Camera();
            scene.add(camera);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0px';
            renderer.domElement.style.left = '0px';
            document.body.appendChild(renderer.domElement);

            const clock = new THREE.Clock();
            const listener = new THREE.AudioListener();
            camera.add(listener);

            // Инициализация AR (камера + параметры из папки data)
            const arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
            arSource.init(() => {
                setTimeout(() => {
                    arSource.onResizeElement();
                    arSource.copyElementSizeTo(renderer.domElement);
                }, 2000);
            });

            const arContext = new THREEx.ArToolkitContext({
                cameraParametersUrl: 'data/camera_para.dat', // Путь к твоему файлу в папке data
                detectionMode: 'mono_and_matrix',
                matrixCodeType: '3x3',
            });

            arContext.init(() => {
                camera.projectionMatrix.copy(arContext.getProjectionMatrix());
            });

            // Настройка контента для маркеров 1, 2, 3
            const markerIds = [1, 2, 3];
            const images = ["author.jpg", "bissaker.jpg", "device.jpg"]; // Файлы в корне
            const sounds = ["author.mp3", "bissaker.mp3", "principle.mp3"]; // Файлы в корне

            const audioMap = new Map();
            const texLoader = new THREE.TextureLoader();
            const audioLoader = new THREE.AudioLoader();

            markerIds.forEach((id, i) => {
                const markerRoot = new THREE.Group();
                scene.add(markerRoot);

                new THREEx.ArMarkerControls(arContext, markerRoot, {
                    type: 'barcode', barcodeValue: id
                });

                // Создаем плоскость с картинкой
                texLoader.load(images[i], (texture) => {
                    const geometry = new THREE.PlaneBufferGeometry(1.2, 1.2);
                    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.rotation.x = -Math.PI / 2;
                    markerRoot.add(mesh);
                });

                // Загружаем аудио
                audioLoader.load(sounds[i], (buffer) => {
                    const sound = new THREE.Audio(listener);
                    sound.setBuffer(buffer);
                    audioMap.set(id, sound);
                });
            });

            // Главный цикл работы
            function animate() {
                requestAnimationFrame(animate);
                if (arSource.ready) {
                    arContext.update(arSource.domElement);
                    
                    markerIds.forEach(id => {
                        const s = audioMap.get(id);
                        if (arContext.arController.barcodeMarkers[id].inCurrent) {
                            if (s && !s.isPlaying) s.play();
                        } else {
                            if (s && s.isPlaying) s.stop();
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
