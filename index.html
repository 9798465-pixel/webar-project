<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r126/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden; background-color: #000;">

    <div id="access" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <div style="text-align: center; font-family: Arial, sans-serif;">
            <p style="font-size: 24px;">PRESS HERE</p>
            <p>TO START AR</p>
        </div>
    </div>

    <script>
        const access = document.getElementById('access');

        access.addEventListener('click', () => {
            access.style.display = 'none'; // Скрываем слой сразу после клика
            initAR();
        });

        function initAR() {
            const scene = new THREE.Scene();
            const camera = new THREE.Camera();
            scene.add(camera);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0px';
            renderer.domElement.style.left = '0px';
            document.body.appendChild(renderer.domElement);

            const clock = new THREE.Clock();
            const listener = new THREE.AudioListener();
            camera.add(listener);

            // Инициализация камеры
            const arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
            arSource.init(() => {
                setTimeout(() => {
                    arSource.onResizeElement();
                    arSource.copyElementSizeTo(renderer.domElement);
                }, 2000);
            });

            // Параметры камеры из твоей папки data
            const arContext = new THREEx.ArToolkitContext({
                cameraParametersUrl: 'data/camera_para.dat',
                detectionMode: 'mono_and_matrix',
                matrixCodeType: '3x3',
            });

            arContext.init(() => {
                camera.projectionMatrix.copy(arContext.getProjectionMatrix());
            });

            // Данные твоих маркеров
            const markerData = [
                { id: 1, img: "author.jpg", audio: "author.mp3" },
                { id: 2, img: "bissaker.jpg", audio: "bissaker.mp3" },
                { id: 3, img: "device.jpg", audio: "principle.mp3" }
            ];

            const audioMap = new Map();
            const texLoader = new THREE.TextureLoader();
            const audioLoader = new THREE.AudioLoader();

            markerData.forEach(data => {
                const markerRoot = new THREE.Group();
                scene.add(markerRoot);

                new THREEx.ArMarkerControls(arContext, markerRoot, {
                    type: 'barcode', barcodeValue: data.id
                });

                // Картинка
                texLoader.load(data.img, (texture) => {
                    const geometry = new THREE.PlaneBufferGeometry(1.2, 1.2);
                    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.rotation.x = -Math.PI / 2;
                    markerRoot.add(mesh);
                });

                // Звук
                audioLoader.load(data.audio, (buffer) => {
                    const sound = new THREE.Audio(listener);
                    sound.setBuffer(buffer);
                    audioMap.set(data.id, sound);
                });
            });

            function animate() {
                requestAnimationFrame(animate);
                if (arSource.ready) {
                    arContext.update(arSource.domElement);
                    
                    markerData.forEach(data => {
                        const s = audioMap.get(data.id);
                        // Проверка видимости маркера
                        if (arContext.arController.barcodeMarkers[data.id].inCurrent) {
                            if (s && !s.isPlaying) s.play();
                        } else {
                            if (s && s.isPlaying) s.stop();
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
